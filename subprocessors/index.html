  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%231c4538'/><text x='50' y='74' text-anchor='middle' fill='%23f5e3cc' font-family='Georgia,serif' font-weight='700' font-size='78'>G</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #1c4538;
      --green-dark:  #143329;
      --green-soft:  #2d6a4f;
      --cream:       #f5e3cc;
      --bg:          #fbf9f4;
      --ink:         #143329;
      --muted:       rgba(20, 51, 41, 0.55);
      --muted-2:     rgba(20, 51, 41, 0.35);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--ink);
      line-height: 1.65;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--green); text-decoration: underline; text-underline-offset: 2px; font-weight: 500; }
    a:hover { color: var(--green-dark); }

    .wrapper { max-width: 860px; margin: 0 auto; padding: 0 1.5rem; }

    /* Nav */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5rem 0;
      border-bottom: 1px solid rgba(20,51,41,0.08);
    }
    .brand { display: flex; align-items: center; gap: 0.7rem; text-decoration: none; }
    .brand-mark { width: 34px; height: 34px; border-radius: 7px; }
    .brand-word { font-family: 'Libre Baskerville', Georgia, serif; font-size: 1.35rem; font-weight: 700; color: var(--green); letter-spacing: -0.03em; }
    .nav-links { display: flex; align-items: center; gap: 1.25rem; font-size: 0.85rem; font-weight: 600; color: var(--muted); }
    .nav-links a { color: inherit; text-decoration: none; text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.75rem; font-weight: 700; }
    .nav-links a:hover { color: var(--green); }

    /* Hero */
    .page-hero { padding: 3rem 0 1.5rem; }
    .page-eyebrow {
      display: inline-block;
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--green-soft); margin-bottom: 0.75rem;
    }
    .page-hero h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900; letter-spacing: -0.02em; line-height: 1.05;
      color: var(--green);
    }

    /* Body */
    article { padding-bottom: 4rem; }
    article h1, article h2, article h3, article h4 {
      font-family: 'Fraunces', Georgia, serif;
      color: var(--green); letter-spacing: -0.01em;
    }
    article h1 { font-size: 1.9rem; font-weight: 800; margin: 2.5rem 0 1rem; }
    article h2 { font-size: 1.45rem; font-weight: 700; margin: 2rem 0 0.75rem; }
    article h3 { font-size: 1.15rem; font-weight: 700; margin: 1.5rem 0 0.5rem; }
    article h4 {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.85rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; margin: 1.25rem 0 0.5rem;
      color: var(--muted);
    }
    article p { margin: 0 0 1rem; }
    article ul, article ol { margin: 0 0 1rem 1.25rem; padding-left: 0.25rem; }
    article ul { list-style: disc; }
    article ol { list-style: decimal; }
    article li { margin-bottom: 0.35rem; }
    article li > p { margin: 0; }
    article strong { font-weight: 700; }
    article em { font-style: italic; }
    article hr { border: 0; border-top: 1px solid rgba(20,51,41,0.1); margin: 2rem 0; }
    article code {
      background: rgba(28,69,56,0.05); padding: 0.1rem 0.35rem;
      border-radius: 4px; font-size: 0.85em;
      font-family: 'Menlo', 'Consolas', monospace;
    }
    article blockquote {
      border-left: 3px solid rgba(28,69,56,0.2);
      padding: 0.25rem 1rem; margin: 1rem 0;
      color: var(--muted); font-style: italic;
    }
    article table {
      width: 100%; border-collapse: collapse;
      margin: 1rem 0; font-size: 0.9rem;
    }
    article th, article td {
      border: 1px solid rgba(20,51,41,0.1);
      padding: 0.5rem 0.75rem; text-align: left; vertical-align: top;
    }
    article th { background: rgba(28,69,56,0.04); font-weight: 700; }

    /* Footer */
    footer {
      border-top: 1px solid rgba(20,51,41,0.08);
      padding: 2rem 0 3rem;
      color: var(--muted); font-size: 0.85rem;
    }
    footer .footer-row {
      display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--green); }
    footer .footer-links { display: flex; gap: 1.25rem; }
  </style>
</head>
<body>
  <div class="wrapper">

    <nav>
      <a href="/" class="brand" aria-label="Gidsly home">
        <svg class="brand-mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="100" height="100" fill="#1c4538"/>
          <text x="50" y="72" text-anchor="middle" fill="#f5e3cc" style="font-family:'Libre Baskerville',serif;font-weight:700;font-size:75px;">G</text>
        </svg>
        <span class="brand-word">Gidsly</span>
      </a>
      <div class="nav-links">
        <a href="/privacy">Privacy</a>
        <a href="/terms">Terms</a>
          <a href="/subprocessors">Subprocessors</a>
      </div>
    </nav>

    <header class="page-hero">
      <span class="page-eyebrow">Subprocessors</span>
      <h1>Subprocessors</h1>
    </header>

    <article>
      <div id="legal-content">
        <p style="color: var(--muted); font-style: italic;">Loading content…</p>
      </div>
    </article>

    <!-- Legal copy is fetched at runtime from the gidsly-content repo. -->
    <!-- Source of truth: https://github.com/wvankempen/gidsly-content/blob/main/subprocessors.md -->
    <!-- Edits to that repo propagate within ~5 min via raw GitHub's short cache. -->
    <script src="/vendor/marked.min.js"></script>
    <script>
      fetch('https://raw.githubusercontent.com/wvankempen/gidsly-content/main/subprocessors.md', { cache: 'no-cache' })
        .then(function(r) {
          if (!r.ok) throw new Error('fetch failed: ' + r.status);
          return r.text();
        })
        .then(function(md) {
          if (typeof marked === 'undefined') throw new Error('marked.js not loaded');
          // Strip leading H1 since the page-hero above already shows the title.
          var body = md.replace(/^#\s+.+\n+/, '');
          document.getElementById('legal-content').innerHTML = marked.parse(body);
        })
        .catch(function(err) {
          document.getElementById('legal-content').innerHTML =
            '<p>Could not load this content. Please refresh the page, ' +
            'or view the source on ' +
            '<a href="https://github.com/wvankempen/gidsly-content/blob/main/subprocessors.md">GitHub</a>.</p>';
          console.error('[gidsly-content] fetch error:', err);
        });
    </script>

    <footer>
      <div class="footer-row">
        <div>Gidsly · Amsterdam · Being built in the Netherlands</div>
        <div class="footer-links">
          <a href="/privacy">Privacy</a>
          <a href="/terms">Terms</a>
          <a href="/subprocessors">Subprocessors</a>
          <span>© 2026 Gidsly</span>
        </div>
      </div>
    </footer>

  </div>
</body>
</html>
